<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entry Page</title>
    <link rel="stylesheet" href="style.css">

<body>
    <div class="container">
        <div id="start-screen" class = "screen ">
            <h1>Quiz Time!</h1>
            <p>Test your knowledge with these fun questions</p>
            <button>Start Quiz</button>
        </div>
        <div id="quiz-screen" class = "screen active">
            <h2>What is the capital city of France?</h2>
            <div id="quiz-info">
                <p>Question <span>1</span> of <span>5</span></p>
                <p>Score: <span>0</span></p>
            </div>
            <div id="quiz-options">
                <button class = "opt-btn">London</button>
                <button class = "opt-btn">London</button>
                <button class = "opt-btn">London</button>
                <button class = "opt-btn">London</button>
            </div>
            <div class="progess">
                <div id="progess" class = "progress"></div>
            </div>
        </div>
        <div id="result-screen" class = "screen ">
            <h1>Quiz Results</h1>
            <div id="quiz-score">
                <p>You scored <span>0</span> out of <span>5</span></p>
                <h3 class = "final-result">Good effort! Keep Learning</h3>
            </div>
            <button>Restart Quiz</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
