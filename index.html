<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entry Page</title>
    <link rel="stylesheet" href="style.css">

<body>
    <div class="container">
        <div id="start-screen" class = "screen active">
            <h1>Quiz Time!</h1>
            <p>Test your knowledge with these fun questions</p>
            <button id = "start-btn">Start Quiz</button>
        </div>
        
        <div id="quiz-screen" class = "screen">
            
            <div id="quiz-header">
                <h2 id="question-text">Question goes here</h2>
                <div class="quiz-info">
                    <p>
                        Question <span id="current-question">1</span> of <span>5</span>
                    </p>
                    <p>
                        Score: <span id="score">0</span>
                    </p>
                </div>
            </div>
            
            <div id="answers-container" class = "answers-container">
                <!-- Answers buttons will be inserted here from our js code later at some point -->
            </div>
            <div class="progess-bar">
                <div id="progess" class = "progress"></div>
            </div>
        </div>
        
        <div id="result-screen" class = "screen">
            <h1>Quiz Results</h1>
            <div id="result-info">
                <p>You scored <span id="final-score">0</span> out of <span id="max-score">5</span></p>
                <div id="result-message">
                    Good job!
                </div>
            </div>
            <button id="restart-btn">Restart Quiz</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
